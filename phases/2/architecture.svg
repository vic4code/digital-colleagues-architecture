<svg viewBox="0 0 780 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title>Phase 2 — Generalized multi-tenant platform</title>
  <desc>Multi-team workspaces, persona/skill registries, RBAC, cost attribution</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/></marker>
  </defs>
  <style>
    .label { font-size: 13px; font-weight: 500; fill: #111827; }
    .sub { font-size: 11px; fill: #6b7280; }
    .tier { font-size: 11px; font-weight: 500; fill: #6b7280; letter-spacing: 0.5px; text-transform: uppercase; }
    .edge { stroke: #9ca3af; stroke-width: 1.2; fill: none; }
    .edgeAccent { stroke: #c2410c; stroke-width: 1.3; fill: none; }
    .edgeDash { stroke-dasharray: 4 3; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1; }
    .boxAgent { fill: #fff7ed; stroke: #fdba74; stroke-width: 1; }
    .boxShared { fill: #f9fafb; stroke: #d1d5db; stroke-dasharray: 4 3; stroke-width: 1; }
    .boxTenant { fill: #ffffff; stroke: #d1d5db; stroke-width: 1; stroke-dasharray: 6 3; }
    .pill { fill: #f3f4f6; stroke: #e5e7eb; stroke-width: 1; }
    .pillAccent { fill: #fff7ed; stroke: #fdba74; stroke-width: 1; }
    .pillNew { fill: #ecfdf5; stroke: #6ee7b7; stroke-width: 1; }
    .edgeLabel { font-size: 10px; fill: #6b7280; font-family: ui-monospace, monospace; }
  </style>

  <text x="20" y="22" class="tier">PHASE 2 · GENERALIZED PLATFORM · MULTI-TENANT</text>

  <text x="20" y="50" class="tier">TENANTS · TEAMS</text>
  <rect x="40" y="64" width="160" height="56" rx="6" class="boxTenant"/>
  <text x="56" y="84" class="label">Legal</text>
  <text x="56" y="100" class="sub">Claire · paralegal bots</text>
  <text x="56" y="114" class="sub">contracts · risk · review</text>
  <rect x="220" y="64" width="160" height="56" rx="6" class="boxTenant"/>
  <text x="236" y="84" class="label">Product</text>
  <text x="236" y="100" class="sub">Vanessa · David</text>
  <text x="236" y="114" class="sub">BRD · ADR · roadmap</text>
  <rect x="400" y="64" width="160" height="56" rx="6" class="boxTenant"/>
  <text x="416" y="84" class="label">Finance</text>
  <text x="416" y="100" class="sub">close · forecast bots</text>
  <text x="416" y="114" class="sub">SOX · reconciliation</text>
  <rect x="580" y="64" width="160" height="56" rx="6" class="boxTenant"/>
  <text x="596" y="84" class="label">+ more teams</text>
  <text x="596" y="100" class="sub">Marketing · Ops · HR</text>
  <text x="596" y="114" class="sub">self-service onboarding</text>

  <text x="20" y="152" class="tier">EDGE · AUTH · RBAC</text>
  <rect x="40" y="166" width="700" height="40" rx="6" class="box"/>
  <text x="60" y="190" class="label">ALB → API Gateway</text>
  <text x="220" y="190" class="sub">Cognito / OIDC · tenant claim in JWT · per-tenant rate limit · WAF</text>

  <line x1="120" y1="120" x2="120" y2="164" class="edge" marker-end="url(#arr)"/>
  <line x1="300" y1="120" x2="300" y2="164" class="edge" marker-end="url(#arr)"/>
  <line x1="480" y1="120" x2="480" y2="164" class="edge" marker-end="url(#arr)"/>
  <line x1="660" y1="120" x2="660" y2="164" class="edge" marker-end="url(#arr)"/>

  <text x="20" y="236" class="tier">ORCHESTRATOR + CONTROL PLANE</text>
  <rect x="40" y="250" width="460" height="120" rx="8" class="box"/>
  <text x="60" y="272" class="label">Orchestrator API</text>
  <text x="60" y="286" class="sub">ECS Fargate · stateless · tenant-aware routing</text>

  <rect x="60" y="298" width="86" height="26" rx="13" class="pill"/>
  <text x="103" y="315" text-anchor="middle" class="sub">/v1/turn</text>
  <rect x="154" y="298" width="100" height="26" rx="13" class="pill"/>
  <text x="204" y="315" text-anchor="middle" class="sub">tenant isolate</text>
  <rect x="262" y="298" width="110" height="26" rx="13" class="pillNew"/>
  <text x="317" y="315" text-anchor="middle" class="sub">RBAC enforcer</text>
  <rect x="380" y="298" width="100" height="26" rx="13" class="pillNew"/>
  <text x="430" y="315" text-anchor="middle" class="sub">cost meter</text>

  <rect x="60" y="332" width="180" height="26" rx="13" class="pillNew"/>
  <text x="150" y="349" text-anchor="middle" class="sub">persona / skill resolver</text>
  <rect x="248" y="332" width="160" height="26" rx="13" class="pill"/>
  <text x="328" y="349" text-anchor="middle" class="sub">workflow template engine</text>

  <line x1="380" y1="206" x2="270" y2="248" class="edge" marker-end="url(#arr)"/>

  <rect x="40" y="390" width="460" height="40" rx="20" class="pillAccent"/>
  <text x="60" y="415" class="label">SQS · turn dispatch (per-tenant FIFO group)</text>
  <line x1="270" y1="370" x2="270" y2="388" class="edge" marker-end="url(#arr)"/>

  <text x="20" y="456" class="tier">WORKER POOL · COLLEAGUE INSTANCE = (PERSONA, TENANT)</text>
  <rect x="40" y="470" width="460" height="170" rx="8" class="boxAgent"/>
  <text x="56" y="492" class="label">Worker fleet</text>
  <text x="56" y="506" class="sub">ECS Fargate · autoscale · tenant-tagged tasks</text>

  <rect x="56" y="518" width="138" height="62" rx="6" class="box"/>
  <text x="125" y="536" text-anchor="middle" class="label">Claire @ Legal</text>
  <text x="125" y="551" text-anchor="middle" class="sub">persona: paralegal</text>
  <text x="125" y="565" text-anchor="middle" class="sub">skills: contract-*</text>

  <rect x="202" y="518" width="138" height="62" rx="6" class="box"/>
  <text x="271" y="536" text-anchor="middle" class="label">Vanessa @ Product</text>
  <text x="271" y="551" text-anchor="middle" class="sub">persona: PM</text>
  <text x="271" y="565" text-anchor="middle" class="sub">skills: brd-* · req-*</text>

  <rect x="348" y="518" width="138" height="62" rx="6" class="box"/>
  <text x="417" y="536" text-anchor="middle" class="label">FinBot @ Finance</text>
  <text x="417" y="551" text-anchor="middle" class="sub">persona: accountant</text>
  <text x="417" y="565" text-anchor="middle" class="sub">skills: close-* · sox-*</text>

  <text x="56" y="608" class="sub">Adding a colleague = INSERT INTO colleagues (persona_id, skill_set, tenant_id, ...).</text>
  <text x="56" y="624" class="sub">Same image, same code path; only the row injected at turn start differs.</text>

  <line x1="270" y1="430" x2="270" y2="468" class="edge" marker-end="url(#arr)"/>

  <text x="520" y="236" class="tier">CONTROL-PLANE REGISTRIES &amp; STATE</text>
  <rect x="520" y="250" width="220" height="390" rx="8" class="boxShared"/>

  <text x="536" y="272" class="label">Persona library</text>
  <text x="536" y="286" class="sub">Prompts · voice · behaviors</text>
  <text x="536" y="300" class="sub">versioned · per-tenant fork</text>
  <line x1="536" y1="310" x2="724" y2="310" class="edge"/>

  <text x="536" y="328" class="label">Skill marketplace</text>
  <text x="536" y="342" class="sub">Reusable capabilities</text>
  <text x="536" y="356" class="sub">contract-review · brd · close</text>
  <line x1="536" y1="366" x2="724" y2="366" class="edge"/>

  <text x="536" y="384" class="label">RBAC store</text>
  <text x="536" y="398" class="sub">Who can talk · approve · audit</text>
  <text x="536" y="412" class="sub">per-tenant role graph</text>
  <line x1="536" y1="422" x2="724" y2="422" class="edge"/>

  <text x="536" y="440" class="label">Postgres (tenant-scoped)</text>
  <text x="536" y="454" class="sub">colleagues · sessions · messages</text>
  <text x="536" y="468" class="sub">row-level security on tenant_id</text>
  <line x1="536" y1="478" x2="724" y2="478" class="edge"/>

  <text x="536" y="496" class="label">S3 (per-tenant prefix + KMS)</text>
  <text x="536" y="510" class="sub">tenant-A/  ·  tenant-B/  ·  ...</text>
  <text x="536" y="524" class="sub">bucket policy enforces isolation</text>
  <line x1="536" y1="534" x2="724" y2="534" class="edge"/>

  <text x="536" y="552" class="label">Cost attribution</text>
  <text x="536" y="566" class="sub">LLM tokens × tenant × colleague</text>
  <text x="536" y="580" class="sub">budgets · alerts · chargeback</text>
  <line x1="536" y1="590" x2="724" y2="590" class="edge"/>

  <text x="536" y="608" class="label">Audit (immutable)</text>
  <text x="536" y="622" class="sub">cross-tenant access logged</text>
  <text x="536" y="636" class="sub">retention per-tenant policy</text>

  <path d="M 500 350 Q 510 350 520 350" class="edge" marker-end="url(#arr)"/>
  <path d="M 500 550 Q 510 550 520 550" class="edgeAccent edgeDash" marker-end="url(#arrAccent)"/>

  <text x="20" y="668" class="tier">WHAT IS NEW VS PHASE 1</text>
  <text x="20" y="686" class="sub">① Tenant boundary throughout · row-level security · per-tenant S3 prefix  ·  ② Persona library + skill marketplace as registries  ·  ③ RBAC service</text>
  <text x="20" y="702" class="sub">④ Cost attribution per tenant/colleague  ·  ⑤ Workflow template engine (reusable request → review → approve)  ·  ⑥ Self-service team onboarding</text>
</svg>
